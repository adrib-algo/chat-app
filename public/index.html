<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <!-- IMPORTANT for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 600px;
            background: #1e293b;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .header {
            padding: 15px;
            background: #3b82f6;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        #messages {
            flex: 1;
            list-style: none;
            padding: 10px;
            margin: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #messages li {
            padding: 10px;
            margin: 5px 0;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 14px;
        }

        .other-message {
            align-self: flex-start;
            background: #334155;
        }

        .my-message {
            align-self: flex-end;
            background: #3b82f6;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #020617;
        }

        #input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
        }

        button {
            margin-left: 8px;
            padding: 10px 12px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        /* 📱 Mobile optimization */
        @media (max-width: 480px) {
            body {
                align-items: stretch;
            }

            .chat-container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                max-width: none;
                max-height: none;
            }

            .header {
                font-size: 14px;
                padding: 12px;
            }

            #messages li {
                font-size: 13px;
                max-width: 80%;
            }

            #input {
                font-size: 13px;
            }

            button {
                padding: 8px 10px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

<div class="chat-container">
    
    <div class="header">💬 Real-time Chat</div>

    <ul id="messages"></ul>

    <div class="input-area">
        <input id="input" autocomplete="off" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    let myId = "";

    socket.on("connect", () => {
        myId = socket.id;
    });

    function sendMessage() {
        const msg = input.value.trim();
        if (msg === "") return;

        socket.emit("chat message", msg);
        input.value = "";
    }

    socket.on("chat message", (data) => {
        const li = document.createElement("li");
        li.textContent = data.text;

        if (data.sender === myId) {
            li.classList.add("my-message");
        } else {
            li.classList.add("other-message");
        }

        messages.appendChild(li);
        messages.scrollTop = messages.scrollHeight;
    });
</script>

</body>
</html>
