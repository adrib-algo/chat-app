<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>

    <!-- Mobile viewport fix -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            height: 100%;
        }

        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 100dvh; /* FIXED for mobile */
            margin: auto;
            background: #1e293b;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 15px;
            background: #3b82f6;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        #messages {
            flex: 1;
            list-style: none;
            padding: 10px;
            margin: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        #messages li {
            padding: 10px;
            margin: 5px 0;
            border-radius: 12px;
            max-width: 75%;
            word-wrap: break-word;
            font-size: 14px;
        }

        .other-message {
            align-self: flex-start;
            background: #334155;
        }

        .my-message {
            align-self: flex-end;
            background: #3b82f6;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #020617;
            position: sticky; /* FIX */
            bottom: 0;
            z-index: 10;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
            background: #1e293b;
            color: white;
            font-size: 14px;
        }

        button {
            margin-left: 8px;
            padding: 10px 12px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

<div class="chat-container">
    
    <div class="header">💬 Real-time Chat</div>

    <ul id="messages"></ul>

    <div class="input-area">
        <input id="input" autocomplete="off" placeholder="Type message..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    const input = document.getElementById("input");
    const messages = document.getElementById("messages");

    let myId = "";

    socket.on("connect", () => {
        myId = socket.id;
    });

    function sendMessage() {
        const msg = input.value.trim();
        if (msg === "") return;

        socket.emit("chat message", msg);
        input.value = "";
    }

    // Enter key support
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    socket.on("chat message", (data) => {
        const li = document.createElement("li");
        li.textContent = data.text;

        if (data.sender === myId) {
            li.classList.add("my-message");
        } else {
            li.classList.add("other-message");
        }

        messages.appendChild(li);

        // Auto scroll
        messages.scrollTop = messages.scrollHeight;
    });
</script>

</body>
</html>
